<!doctype html>

<html lang="en" xml:lang="en" xmlns="http://www.w3.org/1999/xhtml">
  <head>
    <title>Manage data (local) — Stand Your Grounds</title>
    <meta charset="utf-8" />
    <meta
      name="description"
      content="Local-only tool: browse shops.json and look up Places data."
    />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#ffffff" />
    <meta name="robots" content="noindex, nofollow" />

    <link rel="icon" href="/favicon.ico" sizes="32x32" />
    <link rel="icon" href="/favicon.svg" type="image/svg+xml" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />

    <link rel="stylesheet" href="/main.css" type="text/css" charset="utf-8" />

    <style>
      .manage-page {
        min-height: 100vh;
        display: flex;
        flex-direction: column;
        line-height: 1.5;
      }

      .manage-page__banner {
        margin: 0;
        padding: 0.75rem 1rem;
        background: #3d2914;
        color: #f5e6d3;
        font-size: 0.875rem;
        text-align: center;
      }

      .manage-page__head {
        display: flex;
        flex-wrap: wrap;
        align-items: center;
        gap: 0.75rem 1.25rem;
        padding: 1rem 1.25rem;
        border-bottom: 1px solid #ccc;
      }

      .manage-page__head h1 {
        margin: 0;
        font-size: 1.25rem;
      }

      .manage-page__main {
        flex: 1;
        padding: 1.25rem;
        max-width: 960px;
        margin: 0 auto;
        width: 100%;
        box-sizing: border-box;
      }

      .manage-section {
        margin-bottom: 2.5rem;
      }

      .manage-section h2 {
        margin: 0 0 0.75rem;
        font-size: 1.1rem;
      }

      .manage-table-wrap {
        overflow-x: auto;
        border: 1px solid #ccc;
        border-radius: 6px;
      }

      .manage-table {
        width: 100%;
        border-collapse: collapse;
        font-size: 0.8125rem;
      }

      .manage-table th,
      .manage-table td {
        padding: 0.5rem 0.65rem;
        text-align: left;
        border-bottom: 1px solid #e8e8e8;
        vertical-align: top;
      }

      .manage-table th {
        background: #f4f4f4;
        font-weight: 600;
      }

      .manage-table tr:last-child td {
        border-bottom: none;
      }

      .manage-table code {
        font-size: 0.75rem;
        word-break: break-all;
      }

      .manage-lookup__row {
        display: flex;
        flex-wrap: wrap;
        gap: 0.5rem;
        margin-bottom: 1rem;
      }

      .manage-lookup__input {
        flex: 1 1 220px;
        min-width: 0;
        padding: 0.5rem 0.65rem;
        border: 1px solid #ccc;
        border-radius: 4px;
        font-size: 1rem;
      }

      .manage-lookup__btn {
        padding: 0.5rem 1rem;
        border: none;
        border-radius: 4px;
        background: #2563eb;
        color: #fff;
        font-size: 0.875rem;
        font-weight: 500;
        cursor: pointer;
      }

      .manage-lookup__btn:disabled {
        opacity: 0.6;
        cursor: not-allowed;
      }

      .manage-msg {
        padding: 0.65rem 0.75rem;
        border-radius: 4px;
        margin-bottom: 1rem;
        font-size: 0.875rem;
      }

      .manage-msg--error {
        background: #fef2f2;
        color: #991b1b;
        border: 1px solid #fecaca;
      }

      .manage-msg--hint {
        background: #f8fafc;
        color: #334155;
        border: 1px solid #e2e8f0;
      }

      .manage-result {
        border: 1px solid #ccc;
        border-radius: 6px;
        padding: 0.75rem 1rem;
        margin-bottom: 0.75rem;
        background: #fafafa;
      }

      .manage-result h3 {
        margin: 0 0 0.35rem;
        font-size: 1rem;
      }

      .manage-result__meta {
        margin: 0;
        font-size: 0.8125rem;
        color: #444;
      }

      .manage-result__pre {
        margin: 0.65rem 0 0;
        padding: 0.65rem;
        background: #fff;
        border: 1px solid #e5e5e5;
        border-radius: 4px;
        font-size: 0.75rem;
        overflow-x: auto;
        white-space: pre-wrap;
        word-break: break-word;
      }

      .manage-result__actions {
        margin-top: 0.5rem;
      }

      .manage-result__copy {
        padding: 0.35rem 0.65rem;
        font-size: 0.8125rem;
        border: 1px solid #ccc;
        border-radius: 4px;
        background: #fff;
        cursor: pointer;
      }

      .manage-result__copy-done {
        margin-left: 0.5rem;
        font-size: 0.8125rem;
        color: #15803d;
      }
    </style>
  </head>

  <body class="manage-page u-fill-height">
    <p class="manage-page__banner">
      Local development only — not linked from the public app. Uses the same
      <code>config.json</code> key as the map (Maps JS + Places API New).
    </p>
    <header class="manage-page__head">
      <a href="/" class="header-identity">
        <img src="/favicon.svg" alt="" width="40" height="40" />
      </a>
      <h1>Manage shop data</h1>
    </header>
    <main class="manage-page__main" id="manage-root"></main>
    <script src="/manage-data.js" type="module"></script>
  </body>
</html>
